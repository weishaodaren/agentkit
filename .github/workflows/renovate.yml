# Renovate — 依赖安全更新检查
# 文档: https://docs.renovatebot.com/platform/github/#running-as-a-github-action
#
# 需要在仓库 Settings → Secrets 中添加:
#   RENOVATE_TOKEN — GitHub PAT (repo + workflow scope)
#     创建: https://github.com/settings/tokens (Classic, 勾选 repo + workflow)
#     或 Fine-grained: Contents=RW, Pull requests=RW, Workflows=RW

name: Renovate

on:
  # 定时运行：每天 UTC 1:00（北京时间 9:00）
  schedule:
    - cron: "0 1 * * *"
  # 手动触发（支持 dry-run 测试）
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run（仅检测，不创建 PR）"
        required: false
        default: false
        type: boolean
      log-level:
        description: "日志级别"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn
          - error

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v44
        with:
          configurationFile: renovate.json5
          token: ${{ secrets.RENOVATE_TOKEN }}
          dryRun: ${{ inputs.dry-run || false }}
        env:
          LOG_LEVEL: ${{ inputs.log-level || 'info' }}
          # 用于拉取 release notes / changelog，提升速率限制
          GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
