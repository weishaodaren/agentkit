# lefthook git hooks 配置
# 文档: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx}"
      run: pnpm turbo run lint --affected --filter=./{staged_files}
    format:
      glob: "*.{ts,tsx,json,css}"
      run: pnpm oxfmt write {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm turbo run typecheck --affected

commit-msg:
  commands:
